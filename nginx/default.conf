server {
    listen 80;
    server_name adm.nhatphatland.com;

    # Chuyển hướng mọi traffic từ HTTP sang HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Dành cho việc xác thực SSL Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    server_name adm.nhatphatland.com;

    ssl_certificate /etc/letsencrypt/live/adm.nhatphatland.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adm.nhatphatland.com/privkey.pem;

    location / {
        proxy_pass http://next-app:4000; # Tên dịch vụ khai báo trong docker-compose
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}